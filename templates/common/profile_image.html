{% load static %}

<div class="profile-picture">
    {% if scientist.profile_picture %}
        <img src="{{ scientist.profile_picture.url }}" alt="Profile picture" class="profile-pic">
    {% elif scientist.profile_picture_url %}
        <img src="{{ scientist.profile_picture_url }}" alt="Profile picture" class="profile-pic">
    {% else %}
        <img src="{% static 'images/no_image.png' %}" alt="Profile picture" class="profile-pic">
    {% endif %}
</div>
