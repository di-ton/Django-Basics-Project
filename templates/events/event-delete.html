{% extends "projects/project-base.html" %}

{% block project_content %}
<div class="article-section-delete">

  <h2>Delete Event</h2>

  <div class="delete-warning">
    <p>
      You are about to delete this event:
    </p>
    <p>
      <strong>{{ event.name }}</strong>
    </p>
  </div>

  <form method="post" class="delete-form">
    {% csrf_token %}

    <button type="submit" class="btn-article-delete">
      Yes, delete the event
    </button>

    <a href="{% url 'project-events' project.slug %}" class="btn-article-cancel">
      Cancel
    </a>
  </form>

</div>
{% endblock %}
