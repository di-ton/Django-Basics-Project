{% extends "common/base.html" %}


{% block content %}
    <section class="category-page">
      <h1 class="category-title">Project Categories</h1>

      <div class="category-grid">
        {% for code, label in categories %}
          <a href="{% url 'project-by-category' code %}" class="category-circle">
            {{ label }}
          </a>
        {% endfor %}
      </div>
    </section>
{% endblock %}
