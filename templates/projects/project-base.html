{% block content %}
  <section class="project-header">
      <h1>{{ project.title }}</h1>

      {% if project.acronym %}
        <p class="project-acronym">{{ project.acronym }}</p>
      {% endif %}

      <nav class="project-nav">
          <a href="{% url 'project_detail' project.slug %}">Overview</a>
          <a href="{% url 'project_detail' project.slug %}">Members</a>
          <a href="{% url 'project_articles' project.slug %}">Articles</a>
          <a href="{% url 'project_events' project.slug %}">Events</a>

          {% if request.user.is_authenticated %}
              <a href="{% url 'project_edit' project.slug %}">Edit</a>
          {% endif %}
      </nav>
  </section>

  <section class="project-content">
      {% block project_content %}{% endblock %}
  </section>
{% endblock %}
