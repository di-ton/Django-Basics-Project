{% extends "projects/project-base.html" %}

{% block project_content %}
<div class="project-members-form">

    <h1>Manage Members</h1>
    <p class="project-title">{{ project.title }}</p>

    <form method="post">
        {% csrf_token %}

        <fieldset class="members-fieldset">
            <legend>Select project members</legend>

            {% if form.members.errors %}
                <div class="form-errors">
                    {{ form.members.errors }}
                </div>
            {% endif %}

            <ul class="members-list">
                {% for checkbox in form.members %}
                    <li class="member-item">
                        <label>
                            {{ checkbox.tag }}
                            <span class="member-name">
                                {{ checkbox.choice_label }}
                            </span>
                        </label>
                    </li>
                {% endfor %}
            </ul>
        </fieldset>

        <div class="form-actions">
            <button type="submit" class="btn-primary">
                Save members
            </button>

            <a href="{% url 'project-members' project.slug %}"
               class="btn-secondary">
                Cancel
            </a>
        </div>
    </form>

</div>
{% endblock %}
