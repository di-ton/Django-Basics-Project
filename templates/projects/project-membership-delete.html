{% extends "projects/project-base.html" %}

{% block project_content %}
<h2>Remove member</h2>

<p>
  Are you sure you want to remove
  <strong>{{ object.scientist }}</strong>
  from this project?
</p>

<form method="post" action="{% url 'project-members-delete' project.slug membership.id %}">
  {% csrf_token %}
  <button type="submit" class="btn-danger">Remove</button>
  <a href="{% url 'project-members-add' object.project.slug %}">
    Cancel
  </a>
</form>
{% endblock %}
