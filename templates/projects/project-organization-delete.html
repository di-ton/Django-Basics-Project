{% extends "projects/project-base.html" %}

{% block project_content %}
<h2>Remove Organization</h2>

<div class="delete-warning">
  <p>
    You are about to remove the organization
    <strong>{{ organization.name }}</strong>
    from this project.
  </p>

  <p>
    This will not delete the organization itself.
  </p>
</div>

<form method="post" class="form-actions">
  {% csrf_token %}

  <button type="submit" class="btn-danger">
    Remove organization
  </button>

  <a href="{% url 'project-organizations-add' project.slug %}"
     class="btn-secondary">
    Cancel
  </a>
</form>
{% endblock %}
